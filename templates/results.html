<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <!-- 1. FIXED: Removed the accidental comma from the link tag attributes -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Game Result</h1>
        
        <h2>You Chose</h2>
        <!-- 2. FIXED: Changed to user_choice to match your app.py return block -->
        <h3>{{ user_choice }}</h3>
        
        <h2>Computer Chose</h2>
        <!-- 2. FIXED: Changed to computer_choice to match your app.py return block -->
        <h3>{{ computer_choice }}</h3>
        
        <!-- 2. FIXED: Changed to winner to match your app.py return block -->
        <h1 class="winner-announcement">{{ winner }}</h1>
        
        <div class="score">
            <h3>Score Board</h3>
            <!-- 3. FIXED: Changed sessions to session and adjusted draws to draw -->
            <p>Wins: {{ session.wins }}</p>
            <p>Losses: {{ session.losses }}</p>
            <p>Draws: {{ session.draw }}</p>
        </div>
        
        <a href="{{ url_for('home') }}" class="play-again-btn">
            Play Again
        </a>
    </div>
</body>
</html>
