<!DOCTYPE html>
<html>
    <head>
        <title>Rock Paper Scissors - Results</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
    <body>
        <div class="container">
            <h1>Game Results</h1>
            <h2> you chose</h2>
            <h3>{{user}}</h3>
            <h2>Computer chose</h2>
            <h3>{{computer}}</h3>
            <h1>{{result}}</h1>
            <div> class="score">
                <h3> Score Board </h3>
                <p>Wins: {{ session.wins }}</p>
                <p>Losses: {{ session.losses }}</p>
                <p>Draws: {{ session.draws }}</p>
            </div>
            <a href="/">Play Again</a>
        </div>
    </body>
</html>
